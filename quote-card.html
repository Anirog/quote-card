<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2"></script>
  <link rel="stylesheet" href="quote-card.css">
</head>
<body>
  <div class="card">
    <div class="card__border">
      <div class="card__content">
        <p class="card__text" id="quote"></p>
        <div class="card__meta">
          <span class="card__author" id="author"></span>
          <button class="card__refresh" id="refresh-quote" type="button" aria-label="Show another quote">
            <i class="ph-light ph-arrow-clockwise"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script>
    let quotes = [];
    let currentIndex = -1;

    function getNextQuoteIndex() {
      if (quotes.length <= 1) {
        return 0;
      }

      let nextIndex = Math.floor(Math.random() * quotes.length);
      while (nextIndex === currentIndex) {
        nextIndex = Math.floor(Math.random() * quotes.length);
      }

      return nextIndex;
    }

    function renderQuote(index) {
      const quoteElement = document.getElementById('quote');
      const authorElement = document.getElementById('author');
      quoteElement.textContent = quotes[index].text;
      authorElement.textContent = `– ${quotes[index].author}`;
      currentIndex = index;
    }

    function showRandomQuote() {
      if (!quotes.length) {
        return;
      }
      renderQuote(getNextQuoteIndex());
    }

    async function initQuotes() {
      try {
        const response = await fetch('quotes.json');
        quotes = await response.json();
        showRandomQuote();
      } catch (error) {
        console.error('Error loading quote:', error);
        document.getElementById('quote').textContent = 'No matter how you feel today, get up, dress up and show up.';
        document.getElementById('author').textContent = '– Paulo Coelho';
      }
    }

    document.getElementById('refresh-quote').addEventListener('click', showRandomQuote);

    initQuotes();
  </script>
</body>
</html>
